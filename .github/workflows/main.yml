name: Greathost-AutoRenew-Runner

on:
  schedule:
    - cron: '0 4 * * *'  # 每天运行
  workflow_dispatch:      # 允许手动点运行

jobs:
  run-task:
    runs-on: ubuntu-latest
    steps:
      # 1. 【直接用你给的代码】拉取私有仓库到当前根目录
      - name: 拉取私有仓库
        uses: actions/checkout@v4
        with:
          repository: andyzhouyang198611/greathost-login  # 这里填你那个私有库的名字
          token: ${{ secrets.REPO_TOKEN }}               # 必须要在当前公开库设置这个 Secret
          path: .                                        # 拉到根目录，方便后面直接运行

      # 2. 设置环境（接你之前的逻辑）
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium==4.18.1 selenium-wire==5.1.0 blinker==1.7.0 requests

      # 3. 运行私有库里的脚本
      - name: Run renew script
        env:
          GREATHOST_EMAIL: ${{ secrets.GREATHOST_EMAIL }}
          GREATHOST_PASSWORD: ${{ secrets.GREATHOST_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: python greathost.py

      # 4. 把更新后的 README 推回私有库
      - name: Push README changes
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git commit -m "docs: update renewal status" || exit 0
          git push
